<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="HTiSA Rescue">
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="manifest-leerling.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>HTiSA – Duaal Leren</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
  .logo{width:160px;height:160px;object-fit:contain;margin-bottom:16px;animation:pop .6s cubic-bezier(0.34,1.56,0.64,1) forwards;}
  @keyframes pop{from{transform:scale(0.8);opacity:0;}to{transform:scale(1);opacity:1;}}
  h1{font-size:22px;font-weight:800;color:#2596be;margin-bottom:6px;text-align:center;}
  p{font-size:14px;color:#5b8fa0;text-align:center;margin-bottom:28px;line-height:1.6;}
  .btn{display:block;width:100%;max-width:320px;background:#2596be;color:white;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;margin-bottom:10px;transition:background .15s;}
  .btn:hover{background:#1a7295;}
  .install-tip{background:#eef7fb;border:1.5px solid #c2dfe9;border-radius:10px;padding:14px;max-width:320px;margin-top:10px;}
  .install-tip-titel{font-size:12px;font-weight:800;color:#2596be;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;}
  .install-stap{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:#2a6070;margin-bottom:6px;line-height:1.5;}
  .install-stap:last-child{margin-bottom:0;}
  .install-ico{flex-shrink:0;font-size:16px;}
  #status{font-size:13px;color:#2e7d32;font-weight:600;margin-top:12px;text-align:center;min-height:20px;}
</style>
</head>
<body>

<img src="icons/icon-512.png" class="logo" alt="HTiSA logo"/>
<h1>HTiSA – Duaal Leren</h1>
<p>Jouw hulp op de werkvloer.<br>Klik hieronder om de app te openen.</p>

<a href="index.html" class="btn" onclick="activeerLeerling()">▶ App openen als leerling</a>

<div id="status"></div>

<div class="install-tip">
  <div class="install-tip-titel">📲 Installeer op je startscherm</div>
  <div class="install-stap"><span class="install-ico">1️⃣</span><span>Open <strong>deze pagina</strong> in Safari op je iPhone</span></div>
  <div class="install-stap"><span class="install-ico">2️⃣</span><span>Tik op het <strong>Deel-icoon</strong> <span style="font-size:14px">⎋</span> onderaan je scherm</span></div>
  <div class="install-stap"><span class="install-ico">3️⃣</span><span>Kies <strong>"Zet op beginscherm"</strong></span></div>
  <div class="install-stap"><span class="install-ico">4️⃣</span><span>Tik op <strong>"Voeg toe"</strong> — klaar!</span></div>
</div>

<script>
function activeerLeerling(){
  localStorage.setItem('htisa_rol','leerling');
}
// Sla sowieso al op bij laden van deze pagina
localStorage.setItem('htisa_rol','leerling');
document.getElementById('status').textContent = '✓ Ingesteld als leerling';
</script>
</body>
</html>
